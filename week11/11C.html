<!DOCTYPE html>
<html>
<head>
<title>Password Strength</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(120deg, #00b09b, #96c93d);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 2px solid #ccc;
    border-radius: 6px;
}

#msg {
    font-weight: bold;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="card">
    <h2>Password Strength</h2>

    <p><b>Rules:</b><br>
    • At least 6 characters<br>
    • One uppercase letter<br>
    • One special symbol</p>

    <input type="password" id="pass" onkeyup="checkStrength()">
    <p id="msg"></p>
</div>

<script>
function checkStrength() {
    let pass = document.getElementById("pass").value;
    let msg = document.getElementById("msg");

    let strong = /^(?=.*[A-Z])(?=.*[!@#$%^&*]).{6,}$/;
    let medium = /^(?=.*[A-Z]).{6,}$/;

    if (strong.test(pass)) {
        msg.innerText = "Strong Password";
        msg.style.color = "green";
    } 
    else if (medium.test(pass)) {
        msg.innerText = "Medium Password";
        msg.style.color = "orange";
    } 
    else {
        msg.innerText = "Weak Password";
        msg.style.color = "red";
    }
}
</script>

</body>
</html>
