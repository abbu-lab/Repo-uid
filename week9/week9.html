<!DOCTYPE html>
<html>
<head>
    <title>Logic Programs</title>
    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #2c3e50, #4ca1af);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        width: 360px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    h2 {
        color: #333;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 20px;
        text-align: center;
        font-size: 16px;
    }

    .buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #4ca1af;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #2c3e50;
    }

    .output {
        margin-top: 20px;
        padding: 15px;
        background: #f1f1f1;
        border-radius: 8px;
        min-height: 50px;
        color: #333;
    }
    </style>
</head>

<body>

<div class="container">
    <h2>Logic Programs</h2>

    <input type="number" id="numInput" placeholder="Enter a number">

    <div class="buttons">
        <button onclick="checkEvenOdd()">Even / Odd</button>
        <button onclick="checkPrime()">Prime / Not</button>
        <button onclick="calcFactorial()">Factorial</button>
        <button onclick="checkArmstrong()">Armstrong</button>
    </div>

    <div class="output" id="output">Result will appear here</div>
</div>

<script>
function getInput() {
    const val = document.getElementById('numInput').value.trim();
    if (val === '' || isNaN(val)) {
        document.getElementById('output').textContent = 'Please enter a valid number.';
        return null;
    }
    return parseInt(val);
}

function setOutput(text) {
    document.getElementById('output').textContent = text;
}

function checkEvenOdd() {
    const n = getInput();
    if (n === null) return;
    setOutput(n + ' is ' + (n % 2 === 0 ? 'Even' : 'Odd'));
}

function checkPrime() {
    const n = getInput();
    if (n === null) return;
    if (n < 2) { setOutput(n + ' is Not Prime'); return; }
    for (let i = 2; i <= Math.sqrt(n); i++) {
        if (n % i === 0) { setOutput(n + ' is Not Prime'); return; }
    }
    setOutput(n + ' is Prime');
}

function calcFactorial() {
    const n = getInput();
    if (n === null) return;
    if (n < 0) { setOutput('Factorial not defined for negative numbers'); return; }
    let result = 1;
    for (let i = 2; i <= n; i++) result *= i;
    setOutput(n + '! = ' + result);
}

function checkArmstrong() {
    const n = getInput();
    if (n === null) return;
    const digits = String(n).split('');
    const power  = digits.length;
    const sum    = digits.reduce((acc, d) => acc + Math.pow(Number(d), power), 0);
    setOutput(n + (sum === n ? ' is an Armstrong number' : ' is Not an Armstrong number'));
}
</script>

</body>
</html>
